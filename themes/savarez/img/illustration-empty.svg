<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Empty folder shape -->
  <path d="M140,110 L140,90 C140,84 144,80 150,80 L190,80 L200,90 L260,90 C266,90 270,94 270,100 L270,200 C270,206 266,210 260,210 L150,210 C144,210 140,206 140,200 Z"
        fill="none" stroke="url(#ig)" stroke-width="2.5" opacity="0.5"/>

  <!-- Dashed overlay (suggests emptiness) -->
  <rect x="160" y="130" width="80" height="50" rx="8" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Down arrow (subtle) -->
  <polyline points="195,145 200,150 205,145" fill="none" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="150" x2="200" y2="165" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Dots decoration -->
  <circle cx="120" cy="140" r="2" fill="#7C3AED" opacity="0.2"/>
  <circle cx="280" cy="160" r="2" fill="#3B82F6" opacity="0.2"/>
</svg>
